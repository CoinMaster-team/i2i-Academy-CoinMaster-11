server:
  port: ${PORT:8080}
  shutdown: graceful

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      initialization-fail-timeout: 60000
  data:
    redis:
      url: ${REDIS_URL}
      connect-timeout: 10s
      timeout: 10s
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.coinmaster: INFO
