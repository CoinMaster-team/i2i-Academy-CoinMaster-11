spring:
  application:
    name: coinmaster-core
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  profiles:
    default: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/coinmaster}
    username: ${DB_USERNAME:coinmaster}
    password: ${DB_PASSWORD:coinmaster}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: ${FLYWAY_ENABLED:true}

coinmaster:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  account:
    starting-balance: ${STARTING_BALANCE:100000.00}
  market:
    ticker-enabled: ${TICKER_ENABLED:true}
    ticker-rate-ms: ${TICKER_RATE_MS:15000}
    redis-price-prefix: ${REDIS_PRICE_PREFIX:PRICE:}
    redis-session-prefix: ${REDIS_SESSION_PREFIX:SESSION:}
  ai:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-3.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    timeout-ms: ${GEMINI_TIMEOUT_MS:90000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
