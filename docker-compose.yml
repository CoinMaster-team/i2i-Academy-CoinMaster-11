services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: coinmaster
      POSTGRES_USER: coinmaster
      POSTGRES_PASSWORD: coinmaster
    ports:
      - "5432:5432"
    volumes:
      - coinmaster-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  coinmaster-postgres:
